{% extends 'base.html' %}

{% block title %}Cadastrar jogo{% endblock %}

{% block content %}
    <div class="topbar">
        <h1>Cadastrar jogo</h1>
        <div></div>
    </div>

    <div class="card">
        <form action="{{ url_for('create_match') }}" method="POST">
            <div class="form-row">
                <div class="col">
                    <label for="team_a">Time A</label>
                    <select name="team_a" id="team_a" required onchange="updateTeamLabels()">
                        <option value="" disabled selected>Selecione o Time A</option>
                        {% for t in teams %}
                            <option value="{{ t }}">{{ t }}</option>
                      {% endfor %}
                    </select>
                </div>
                <div class="col-narrow col-vs">VS</div>
                <div class="col">
                    <label for="team_b">Time B</label>
                    <select name="team_b" id="team_b" required onchange="updateTeamLabels()">
                        <option value="" disabled selected>Selecione o Time B</option>
                        {% for t in teams %}
                            <option value="{{ t }}">{{ t }}</option>
                      {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="col">
                    <label for="match_date">Data e Hora</label>
                    <input type="datetime-local" name="match_date" id="match_date" required>
                </div>
                <div class="col">
                    <label for="round">Fase</label>
                    <select name="round" id="round" required onchange="toggleWinnerSection()">
                      <option value="" disabled selected>Selecione a fase</option>
                      {% for p in phases %}
                        <option value="{{ p }}">{{ p }}</option>
                      {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="col">
                    <label for="score_a">Placar Time A (opcional)</label>
                    <input type="number" name="score_a" id="score_a" min="0" step="1" oninput="toggleWinnerSection()">
                </div>
                <div class="col">
                    <label for="score_b">Placar Time B (opcional)</label>
                    <input type="number" name="score_b" id="score_b" min="0" step="1" oninput="toggleWinnerSection()">
                </div>
            </div>

            <div id="winner-section" class="winner-section" style="display: none;">
                <label for="winner">Quem se classificou nos pênaltis?</label>
                <select name="winner" id="winner">
                    <option value="" disabled selected>Selecione o vencedor</option>
                    <option value="A" id="winner-option-a">Time A</option>
                    <option value="B" id="winner-option-b">Time B</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit">Cadastrar Jogo</button>
                <a href="{{ url_for('matches') }}" class="link-muted">Cancelar</a>
            </div>
        </form>
    </div>
{% endblock %}

{% block scripts %}
<script>
function updateTeamLabels() {
    const teamA = document.getElementById('team_a').value;
    const teamB = document.getElementById('team_b').value;
    document.getElementById('winner-option-a').textContent = teamA || 'Time A';
    document.getElementById('winner-option-b').textContent = teamB || 'Time B';
}

function toggleWinnerSection() {
    const round = document.getElementById('round').value;
    const scoreAInput = document.getElementById('score_a');
    const scoreBInput = document.getElementById('score_b');
    const winnerSection = document.getElementById('winner-section');
    const winnerSelect = document.getElementById('winner');

    // Segue a lógica do backend: tudo que não for Fase de Grupos é mata-mata
    const isKnockout = round !== '' && round !== 'Fase de Grupos';

    const scoreA = scoreAInput.value;
    const scoreB = scoreBInput.value;

    if (isKnockout && scoreA !== '' && scoreB !== '' && parseInt(scoreA) === parseInt(scoreB)) {
        winnerSection.style.display = 'block';
        winnerSelect.setAttribute('required', 'required');
    } else {
        winnerSection.style.display = 'none';
        winnerSelect.removeAttribute('required');
    }
}

document.addEventListener('DOMContentLoaded', toggleWinnerSection);
</script>
{% endblock %}
