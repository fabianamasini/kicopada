{% extends 'base.html' %}

{% block title %}Cadastrar palpite{% endblock %}

{% block content %}
    <div class="topbar">
        <h1>Cadastrar palpite</h1>
        <div></div>
    </div>

    <div class="card">
        <form action="{{ url_for('create_guess') }}" method="POST">
            <div class="form-row">
                <div class="col">
                    <label for="match">Jogo</label>
                    <select name="match_id" id="match" required onchange="updateMatchDetails(this)">
                        <option value="" disabled {% if not selected_match_id %}selected{% endif %}>Selecione o jogo</option>
                        {% for m in matches %}
                            {% if m.is_editable() %}
                                <option value="{{ m.id }}"
                                        data-knockout="{{ 'true' if m.is_knockout else 'false' }}"
                                        data-team-a="{{ m.team_a }}"
                                        data-team-b="{{ m.team_b }}"
                                        {% if m.id == selected_match_id %}selected{% endif %}>
                                    {{ m.team_a }} vs {{ m.team_b }} — {{ m.formatted_date }}
                                </option>
                            {% endif %}
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="col">
                    <label for="pred_a" id="label-pred-a">Placar Time A</label>
                    <input type="number" name="pred_a" id="pred_a" min="0" step="1" required oninput="toggleWinnerSection()">
                </div>
                <div class="col">
                    <label for="pred_b" id="label-pred-b">Placar Time B</label>
                    <input type="number" name="pred_b" id="pred_b" min="0" step="1" required oninput="toggleWinnerSection()">
                </div>
            </div>

            <div id="knockout-section" style="display: none;">
                <div id="winner-section" class="winner-section" style="display: none;">
                    <label for="winner_pred">Quem se classifica?</label>
                    <select name="winner_pred" id="winner_pred">
                        <option value="" disabled selected>Selecione</option>
                        <option value="A" id="winner-option-a">Time A</option>
                        <option value="B" id="winner-option-b">Time B</option>
                    </select>
                    <div class="form-text">
                        Se o jogo for para os pênaltis, selecione o time que você acha que vai se classificar.
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit">Cadastrar Palpite</button>
                <a href="{{ url_for('guesses') }}" class="link-muted">
                    <span class="material-symbols-outlined">
                        Cancelar
                    </span>
                </a>
            </div>
        </form>
    </div>
{% endblock %}

{% block scripts %}
<script>
function updateMatchDetails(select) {
    const option = select.options[select.selectedIndex];
    const isKnockout = option.getAttribute('data-knockout') === 'true';
    const teamA = option.getAttribute('data-team-a') || 'Time A';
    const teamB = option.getAttribute('data-team-b') || 'Time B';

    document.getElementById('label-pred-a').textContent = 'Placar ' + teamA;
    document.getElementById('label-pred-b').textContent = 'Placar ' + teamB;    
    document.getElementById('winner-option-a').textContent = teamA;
    document.getElementById('winner-option-b').textContent = teamB;

    document.getElementById('knockout-section').style.display = isKnockout ? 'block' : 'none';
    toggleWinnerSection(); // Chama para ajustar a visibilidade da seção de vencedor
}

function toggleWinnerSection() {
    const knockoutSection = document.getElementById('knockout-section');
    const winnerSection = document.getElementById('winner-section');
    const predAInput = document.getElementById('pred_a');
    const predBInput = document.getElementById('pred_b');
    const winnerPredSelect = document.getElementById('winner_pred');

    if (knockoutSection.style.display === 'block') { // Apenas se for mata-mata
        const predA = parseInt(predAInput.value);
        const predB = parseInt(predBInput.value);

        if (!isNaN(predA) && !isNaN(predB) && predA === predB) {
            winnerSection.style.display = 'block';
            winnerPredSelect.setAttribute('required', 'required');
        } else {
            winnerSection.style.display = 'none';
            winnerPredSelect.removeAttribute('required');
            winnerPredSelect.value = ''; // Limpa a seleção se não for empate
        }
    } else {
        winnerSection.style.display = 'none';
        winnerPredSelect.removeAttribute('required');
        winnerPredSelect.value = '';
    }
}

// Pré-seleção via URL (?match_id=...): aplica os labels dos times e a seção de pênaltis ao carregar
(function () {
    const select = document.getElementById('match');
    if (select && select.value) updateMatchDetails(select);
})();
</script>
{% endblock %}
