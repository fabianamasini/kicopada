{% extends 'base.html' %}

{% block title %}Cadastrar palpite{% endblock %}

{% block content %}
    <div class="topbar">
        <h1>Cadastrar palpite</h1>
        <div></div>
    </div>

    <div class="card">
        <form action="{{ url_for('create_guess') }}" method="POST">
            <div class="form-row">
                <div class="col">
                    <label for="match">Jogo</label>
                    <select name="match_id" id="match" required onchange="updateMatchDetails(this)">
                        <option value="" disabled selected>Selecione o jogo</option>
                        {% for m in matches %}
                            {% if m.is_editable() %}
                                <option value="{{ m.id }}" 
                                        data-knockout="{{ 'true' if m.is_knockout else 'false' }}"
                                        data-team-a="{{ m.team_a }}" 
                                        data-team-b="{{ m.team_b }}">
                                    {{ m.team_a }} vs {{ m.team_b }} — {{ m.formatted_date }}
                                </option>
                            {% endif %}
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="col">
                    <label for="pred_a" id="label-pred-a">Placar Time A</label>
                    <input type="number" name="pred_a" id="pred_a" min="0" step="1" required>
                </div>
                <div class="col">
                    <label for="pred_b" id="label-pred-b">Placar Time B</label>
                    <input type="number" name="pred_b" id="pred_b" min="0" step="1" required>
                </div>
            </div>

            <div id="knockout-section" style="display: none;">
                <div class="card" style="margin-top: 15px; border: 1px dashed #ff6b6b;">
                    <div class="form-row">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: bold;">
                            <input type="checkbox" id="check-penalty" name="decided_by_penalty" 
                                onchange="togglePenaltyFields(this.checked)">
                            🏆 Decidido nos Pênaltis?
                        </label>
                    </div>

                    <div id="penalty-inputs" style="display: none; gap: 12px; margin-top: 10px;">
                        <div class="col">
                            <label id="label-penalty-a">Pênaltis Time A</label>
                            <input type="number" name="penalty_a" placeholder="0">
                        </div>
                        <div class="col">
                            <label id="label-penalty-b">Pênaltis Time B</label>
                            <input type="number" name="penalty_b" placeholder="0">
                        </div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 20px; display: flex; gap: 12px;">
                <button type="submit">Cadastrar Palpite</button>
                <a href="{{ url_for('guesses') }}" class="link-muted" style="align-self: center;">Cancelar</a>
            </div>
        </form>
    </div>
{% endblock %}

{% block scripts %}
<script>
function updateMatchDetails(select) {
    const option = select.options[select.selectedIndex];
    const isKnockout = option.getAttribute('data-knockout') === 'true';
    const teamA = option.getAttribute('data-team-a') || 'Time A';
    const teamB = option.getAttribute('data-team-b') || 'Time B';

    document.getElementById('label-pred-a').textContent = 'Placar ' + teamA;
    document.getElementById('label-pred-b').textContent = 'Placar ' + teamB;
    document.getElementById('label-penalty-a').textContent = 'Pênaltis ' + teamA;
    document.getElementById('label-penalty-b').textContent = 'Pênaltis ' + teamB;

    document.getElementById('knockout-section').style.display = isKnockout ? 'block' : 'none';
}

function togglePenaltyFields(isChecked) {
    const container = document.getElementById('penalty-inputs');
    container.style.display = isChecked ? 'flex' : 'none';
    if (!isChecked) {
        container.querySelectorAll('input').forEach(i => i.value = '');
    }
}
</script>
{% endblock %}
