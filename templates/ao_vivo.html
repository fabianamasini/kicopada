{% extends 'base.html' %}

{% block title %}Ao Vivo - Kicopada{% endblock %}
{% block page_title %}Ao Vivo{% endblock %}

{% block content %}
<div class="ao-vivo">
    <!-- Barra de transmissão -->
    <div class="live-hero">
        <div class="live-hero-main">
            <span class="live-hero-dot" aria-hidden="true"></span>
            <span class="live-hero-title">AO VIVO</span>
        </div>
        <div class="live-hero-meta">
            <span class="live-hero-count" id="live-count"></span>
            <span class="live-hero-clock" id="live-clock">--:--:--</span>
        </div>
    </div>

    <div class="live-bar">
        <label class="live-toggle">
            <input type="checkbox" id="toggle-cards" checked>
            <span>Cartões</span>
        </label>
    </div>

    <!-- Estados -->
    <div id="live-loading" class="live-state">Carregando placares…</div>
    <div id="live-error" class="live-state is-error" hidden>Falha ao atualizar. Tentando de novo…</div>
    <div id="live-empty" class="live-state" hidden>Nenhum jogo ao vivo agora.</div>

    <!-- Cards de jogos -->
    <div id="live-matches" class="live-matches"></div>
</div>

<!-- Comemoração de gol -->
<div id="goal-flash" class="goal-flash" hidden>
    <div class="goal-flash-inner">
        <div class="goal-flash-word">GOOOL!</div>
        <div class="goal-flash-scorer" id="goal-flash-scorer"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
    const API = "/api/ao-vivo" + window.location.search; // passa ?date= adiante (p/ testar)
    const INTERVAL = 5000;
    const CARDS_KEY = 'kicopada.aovivo.cards';

    const $ao = document.querySelector('.ao-vivo');
    const $matches = document.getElementById('live-matches');
    const $loading = document.getElementById('live-loading');
    const $empty = document.getElementById('live-empty');
    const $error = document.getElementById('live-error');
    const $count = document.getElementById('live-count');
    const $clock = document.getElementById('live-clock');
    const $flash = document.getElementById('goal-flash');
    const $flashScorer = document.getElementById('goal-flash-scorer');
    const $toggle = document.getElementById('toggle-cards');

    let goalsSeen = {};   // id do jogo -> nº de gols já visto (p/ detectar gol novo)
    let firstLoad = true;

    function esc(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function pad(n) { return String(n).padStart(2, '0'); }

    function tickClock() {
        const d = new Date();
        $clock.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    function localTime(m) {
        // date_utc é UTC cru; converte pro fuso do navegador. Cai pro horário
        // de São Paulo (m.date) se a data UTC vier faltando.
        if (m.date_utc) {
            const d = new Date(m.date_utc);
            if (!isNaN(d)) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        return (m.date || '').slice(11, 16);
    }

    function statusInfo(m) {
        const s = m.status || {};
        if (s.live) return { cls: 'is-live', label: 'AO VIVO', sub: s.clock || (s.minute != null ? s.minute + "'" : '') };
        if (s.finished) return { cls: 'is-finished', label: 'ENCERRADO', sub: m.penalties ? 'nos pênaltis' : '' };
        return { cls: 'is-scheduled', label: 'HOJE', sub: localTime(m) };
    }

    function goalTag(kind) {
        if (kind === 'penalty') return ' (pên)';
        if (kind === 'own_goal') return ' (contra)';
        return '';
    }

    // Feed cronológico de gols + cartões da partida
    function eventsHtml(m) {
        const evs = [];
        (m.goals || []).forEach(function (g) {
            evs.push({ mv: g.minute_value, html:
                '<span class="live-event is-goal side-' + esc(g.side || '') + '">' +
                '<b>' + esc(g.minute) + '</b> ⚽ ' + esc(g.scorer || '') + esc(goalTag(g.kind)) + '</span>' });
        });
        (m.cards || []).forEach(function (c) {
            evs.push({ mv: c.minute_value, html:
                '<span class="live-event is-card side-' + esc(c.side || '') + '">' +
                '<b>' + esc(c.minute) + '</b> <span class="live-cardicon is-' + esc(c.kind) + '"></span> ' +
                esc(c.player || '') + '</span>' });
        });
        if (!evs.length) return '';
        evs.sort(function (a, b) { return (a.mv == null ? 999 : a.mv) - (b.mv == null ? 999 : b.mv); });
        return '<div class="live-events">' + evs.map(function (e) { return e.html; }).join('') + '</div>';
    }

    function num(v) { return (v === null || v === undefined) ? '·' : v; }

    function cardHtml(m) {
        const st = statusInfo(m);
        const a = m.team_a || {}, b = m.team_b || {};
        const live = st.cls === 'is-live';
        const scheduled = st.cls === 'is-scheduled';

        let center;
        if (scheduled) {
            center = '<span class="live-kickoff">' + esc(st.sub || '—') + '</span>';
        } else {
            center = '<span class="live-num">' + esc(num(a.score)) + '</span>' +
                     '<span class="live-sep">—</span>' +
                     '<span class="live-num">' + esc(num(b.score)) + '</span>';
        }

        const pens = m.penalties
            ? '<div class="live-pens">Pênaltis ' + esc(m.penalties.a) + ' — ' + esc(m.penalties.b) + '</div>'
            : '';

        return '<article class="live-card ' + st.cls + '">' +
            '<div class="live-status">' +
                '<span class="live-badge">' + (live ? '<span class="live-badge-dot"></span>' : '') + esc(st.label) + '</span>' +
                (st.sub ? '<span class="live-min">' + esc(st.sub) + '</span>' : '') +
                '<span class="live-round">' + esc(m.round || '') + '</span>' +
            '</div>' +
            '<div class="live-score">' +
                '<div class="live-team live-team-a"><span class="live-team-name">' + esc(a.name || a.raw || 'Time A') + '</span></div>' +
                '<div class="live-nums' + (scheduled ? ' is-kickoff' : '') + '">' + center + '</div>' +
                '<div class="live-team live-team-b"><span class="live-team-name">' + esc(b.name || b.raw || 'Time B') + '</span></div>' +
            '</div>' +
            pens +
            eventsHtml(m) +
        '</article>';
    }

    // Tira a bandeira/emoji do começo do nome pra ordenar alfabeticamente
    function alphaKey(m) {
        const n = ((m.team_a || {}).name) || ((m.team_a || {}).raw) || '';
        return n.replace(/^[^\p{L}]+/u, '');
    }
    function totalGoals(m) {
        const a = (m.team_a || {}).score, b = (m.team_b || {}).score;
        return (a || 0) + (b || 0);
    }
    function sortMatches(matches) {
        const rank = { 'in': 0, 'pre': 1, 'post': 2 };
        return matches.slice().sort(function (x, y) {
            const rx = rank[(x.status || {}).state] ?? 3;
            const ry = rank[(y.status || {}).state] ?? 3;
            if (rx !== ry) return rx - ry;                       // ao vivo > hoje > encerrado
            const gd = totalGoals(y) - totalGoals(x);            // mais gols primeiro
            if (gd !== 0) return gd;
            return alphaKey(x).localeCompare(alphaKey(y), 'pt'); // empate: alfabética
        });
    }

    function flashGoal(scorer, team) {
        $flashScorer.textContent = (scorer ? scorer + ' ' : '') + (team ? '· ' + team : '');
        $flash.hidden = false;
        $flash.classList.remove('is-on');
        void $flash.offsetWidth;          // reinicia a animação
        $flash.classList.add('is-on');
        clearTimeout(flashGoal._t);
        flashGoal._t = setTimeout(function () { $flash.hidden = true; }, 3200);
    }

    function detectGoals(matches) {
        matches.forEach(function (m) {
            const n = (m.goals || []).length;
            const before = goalsSeen[m.id];
            if (!firstLoad && before !== undefined && n > before) {
                const g = m.goals[m.goals.length - 1];  // gol mais recente
                flashGoal(g.scorer, g.team);
            }
            goalsSeen[m.id] = n;
        });
    }

    function render(data) {
        $loading.hidden = true;
        const matches = (data && data.matches) || [];
        $error.hidden = !(data && data.error);

        if (!matches.length) {
            $empty.hidden = false;
            $matches.innerHTML = '';
            $count.textContent = '';
            return;
        }
        $empty.hidden = true;

        const liveN = matches.filter(function (m) { return (m.status || {}).live; }).length;
        $count.textContent = liveN ? (liveN + ' ao vivo') : (matches.length + ' hoje');

        detectGoals(matches);
        $matches.innerHTML = sortMatches(matches).map(cardHtml).join('');
        firstLoad = false;
    }

    function poll() {
        fetch(API, { headers: { 'Accept': 'application/json' } })
            .then(function (r) { return r.json(); })
            .then(render)
            .catch(function () { $loading.hidden = true; $error.hidden = false; });
    }

    // Checkbox "Cartões" (lembra a escolha no navegador)
    function applyCards(show) { $ao.classList.toggle('hide-cards', !show); }
    let showCards = true;
    try { showCards = localStorage.getItem(CARDS_KEY) !== '0'; } catch (e) {}
    $toggle.checked = showCards;
    applyCards(showCards);
    $toggle.addEventListener('change', function () {
        applyCards($toggle.checked);
        try { localStorage.setItem(CARDS_KEY, $toggle.checked ? '1' : '0'); } catch (e) {}
    });

    tickClock();
    setInterval(tickClock, 1000);
    poll();
    // Pausa o poll quando a aba está em segundo plano (poupa rede/bateria e a API
    // keyless) e retoma — com atualização imediata — ao voltar.
    let pollTimer = setInterval(poll, INTERVAL);
    document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
            clearInterval(pollTimer);
            pollTimer = null;
        } else if (!pollTimer) {
            poll();
            pollTimer = setInterval(poll, INTERVAL);
        }
    });
})();
</script>
{% endblock %}
